<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320">
  <defs>
    <radialGradient id="vinyl" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1c1c1c"/>
      <stop offset="0.55" stop-color="#0d0d0d"/>
      <stop offset="0.56" stop-color="#161616"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <style>
      .spin { animation: rot 4s linear infinite; transform-origin: 210px 160px; }
      @keyframes rot { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
      .arm { animation: bob 6s ease-in-out infinite; transform-origin: 600px 78px; }
      @keyframes bob { 0%,100% { transform: rotate(24deg);} 50% { transform: rotate(26.5deg);} }
      .blink { animation: pulse 2.2s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: .35;} 50% { opacity: 1;} }
      .t { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <rect x="0" y="0" width="820" height="320" fill="#000000"/>
  <rect x="1" y="1" width="818" height="318" fill="none" stroke="#ffffff" stroke-width="2"/>

  <g class="spin">
    <circle cx="210" cy="160" r="120" fill="url(#vinyl)"/>
    <circle cx="210" cy="160" r="120" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="210" cy="160" r="106" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    <circle cx="210" cy="160" r="92" fill="none" stroke="#242424" stroke-width="1"/>
    <circle cx="210" cy="160" r="78" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    <circle cx="210" cy="160" r="64" fill="none" stroke="#242424" stroke-width="1"/>
    <path d="M210 40 A120 120 0 0 1 330 160 L302 160 A92 92 0 0 0 210 68 Z" fill="#ffffff" opacity="0.04"/>
    <circle cx="210" cy="160" r="44" fill="#ffffff"/>
    <text x="210" y="156" text-anchor="middle" class="t" font-size="14" font-weight="700" letter-spacing="0.5" fill="#000000">sid:paleja</text>
    <text x="210" y="174" text-anchor="middle" class="t" font-size="10" letter-spacing="1.5" fill="#000000">rotation 001</text>
    <circle cx="210" cy="160" r="4" fill="#000000"/>
  </g>

  <g class="arm">
    <circle cx="600" cy="78" r="15" fill="#000000" stroke="#ffffff" stroke-width="2"/>
    <circle cx="600" cy="78" r="4" fill="#ffffff"/>
    <rect x="430" y="74" width="172" height="6" rx="3" fill="#ffffff" transform="rotate(26 600 78)"/>
    <rect x="404" y="68" width="32" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="2" transform="rotate(26 600 78)"/>
  </g>

  <circle cx="452" cy="196" r="4" fill="#ffffff" class="blink"/>
  <text x="466" y="201" class="t" font-size="12" letter-spacing="3" fill="#ffffff">NOW PLAYING</text>
  <text x="452" y="236" class="t" font-size="26" font-weight="700" letter-spacing="0.5" fill="#ffffff">sid:selects</text>
  <text x="452" y="262" class="t" font-size="13" letter-spacing="1" fill="#8a8a8a">click to listen on spotify</text>

  <text x="452" y="52" class="t" font-size="12" letter-spacing="4" fill="#8a8a8a">SIDDHARTH PALEJA</text>
</svg>
